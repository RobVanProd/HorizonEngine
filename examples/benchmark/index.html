<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizon Engine — Benchmark</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #overlay {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #c8c8d0;
      font: 13px/1.5 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
      background: rgba(10, 10, 14, 0.82);
      border: 1px solid rgba(100, 100, 120, 0.25);
      border-radius: 6px;
      padding: 10px 14px;
      pointer-events: none;
      min-width: 280px;
      backdrop-filter: blur(6px);
    }
    #overlay h2 {
      font-size: 14px;
      font-weight: 600;
      color: #eee;
      margin-bottom: 6px;
      letter-spacing: 0.03em;
    }
    #overlay .row {
      display: flex;
      justify-content: space-between;
      padding: 1px 0;
    }
    #overlay .label { color: #888; }
    #overlay .value { color: #6cf; font-weight: 500; }
    #overlay .sep {
      border-top: 1px solid rgba(100, 100, 120, 0.2);
      margin: 5px 0;
    }
    #error-banner {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(10, 10, 14, 0.95);
      color: #f66;
      font: 16px/1.6 system-ui, sans-serif;
      padding: 40px;
      z-index: 10;
    }
    #error-banner a { color: #6cf; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="overlay">
    <h2>Horizon Engine — Phase 0 Benchmark</h2>
    <div id="stats"></div>
  </div>
  <div id="error-banner"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
