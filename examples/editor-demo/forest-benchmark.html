<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horizon Forest Benchmark v0</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; background: #0b1014; color: #d8e1e8; font: 13px/1.5 'JetBrains Mono', 'Fira Code', monospace; }
    body { display: grid; grid-template-columns: minmax(320px, 420px) 1fr; }
    #panel { padding: 18px; border-right: 1px solid rgba(120, 140, 160, 0.18); background: linear-gradient(180deg, rgba(11,16,20,0.98), rgba(13,18,23,0.94)); }
    h1 { font-size: 16px; margin: 0 0 8px; color: #eef4f8; }
    p { margin: 0 0 10px; color: #9fb1c1; }
    #status { margin: 10px 0 14px; padding: 10px 12px; border-radius: 8px; background: rgba(50, 78, 94, 0.25); color: #d6edf7; }
    #download-json { padding: 10px 12px; border: 0; border-radius: 8px; background: #78d1ff; color: #0b1014; font: inherit; font-weight: 700; cursor: pointer; }
    #download-json:disabled { cursor: not-allowed; opacity: 0.5; }
    #records { margin-top: 14px; padding: 12px; border-radius: 8px; border: 1px solid rgba(120, 140, 160, 0.18); background: rgba(8, 13, 17, 0.8); white-space: pre-wrap; overflow: auto; max-height: calc(100vh - 220px); }
    #app { position: relative; width: 100%; height: 100%; }
    .benchmark-host { position: absolute; inset: 0; }
  </style>
</head>
<body>
  <aside id="panel">
    <h1>Forest Stress Benchmark v0</h1>
    <p>Scene: <code>first-nature-expedition</code></p>
    <p>Runs: <code>low</code>, <code>medium</code>, <code>high</code>, <code>extreme</code> on fresh engine instances.</p>
    <div id="status">Waiting to start...</div>
    <button id="download-json" disabled>Download JSON</button>
    <pre id="records"></pre>
  </aside>
  <main id="app"></main>
  <script type="module" src="./src/forest-benchmark-entry.ts"></script>
</body>
</html>
